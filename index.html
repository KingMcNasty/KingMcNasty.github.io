<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexagon Calculator</title>
<meta name="description" content="Instantly calculate every dimension of a regular hexagon.">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://hexagoncalc.com">
<meta property="og:title" content="Hexagon Calculator">
<meta property="og:description" content="Instantly calculate every dimension of a regular hexagon.">
<meta property="og:site_name" content="Nemac DESIGNS">

<!-- Twitter/X Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:url" content="https://hexagoncalc.com">
<meta name="twitter:title" content="Hexagon Calculator">
<meta name="twitter:description" content="Instantly calculate every dimension of a regular hexagon.">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Hexagon Calculator",
  "url": "https://hexagoncalc.com",
  "description": "Instantly calculate every dimension of a regular hexagon.",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "author": {
    "@type": "Organization",
    "name": "Nemac DESIGNS",
    "url": "https://hexagoncalc.com"
  }
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f0ece8;color:#1a1a1a;min-height:100vh}
.hero{background:linear-gradient(135deg,#7b1c2e 0%,#b03045 50%,#c8556a 100%);padding:1.5rem 1rem;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.hero h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:0.01em}
.subtitle{text-align:center;font-size:16px;color:#7a6f68;margin:1.1rem auto 1.5rem;max-width:630px;padding:0 1rem;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;max-width:900px;margin:0 auto;padding:0 1rem 2rem}
.card{background:#fff;border:none;border-radius:14px;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card svg{width:100%;height:auto;display:block}
.label{font-size:16px;font-weight:500;color:#444;text-align:center}
.field{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:16px;font-family:'DM Sans',system-ui,sans-serif;background:#f9f7f5;color:#1a1a1a;text-align:center;outline:none;transition:border-color .15s}
.field:focus{border-color:#c0273d}
.note{font-size:11px;color:#aaa;text-align:center}
@media(max-width:480px){
  body{padding:0}
  .grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:17px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>Hexagon Calculator</h1>
</div>
<p class="subtitle">Instantly calculate every dimension of a regular hexagon.</p>

<div class="grid">

<!-- 1: Side length -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <line x1="60" y1="8" x2="103" y2="32" stroke="#c0273d" stroke-width="2.2"/>
    <text x="88" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">a</text>
  </svg>
  <span class="label">Side length</span>
  <input class="field" id="f-side" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('side',this.value)">
  <span class="note">Length of one side</span>
</div>

<!-- 2: Circumradius -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <line x1="60" y1="8" x2="60" y2="55" stroke="#c0273d" stroke-width="2.2"/>
    <text x="65" y="36" text-anchor="start" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">R</text>
  </svg>
  <span class="label">Circumradius</span>
  <input class="field" id="f-circumradius" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('circumradius',this.value)">
  <span class="note">Center to vertex</span>
</div>

<!-- 3: Apothem -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <line x1="60" y1="55" x2="103" y2="55" stroke="#c0273d" stroke-width="2.2"/>
    <text x="83" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">r</text>
  </svg>
  <span class="label">Apothem</span>
  <input class="field" id="f-apothem" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('apothem',this.value)">
  <span class="note">Center to flat side</span>
</div>

<!-- 4: Short diagonal -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <line x1="17" y1="55" x2="103" y2="55" stroke="#c0273d" stroke-width="2.2"/>
    <text x="60" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">s</text>
  </svg>
  <span class="label">Short diagonal</span>
  <input class="field" id="f-short" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('short',this.value)">
  <span class="note">Flat side to flat side</span>
</div>

<!-- 5: Long diagonal -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#ccc" stroke-width="1.2"/>
    <line x1="60" y1="8" x2="60" y2="102" stroke="#c0273d" stroke-width="2.2"/>
    <text x="65" y="58" text-anchor="start" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">d</text>
  </svg>
  <span class="label">Long diagonal</span>
  <input class="field" id="f-long" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('long',this.value)">
  <span class="note">Vertex to vertex</span>
</div>

<!-- 6: Perimeter -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="none" stroke="#c0273d" stroke-width="2.2"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">P</text>
  </svg>
  <span class="label">Perimeter</span>
  <input class="field" id="f-perim" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('perim',this.value)">
  <span class="note">Total edge length</span>
</div>

<!-- 7: Area -->
<div class="card">
  <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,8 103,32 103,78 60,102 17,78 17,32" fill="rgba(192,39,61,0.15)" stroke="#ccc" stroke-width="1.2"/>
    <text x="60" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0273d" font-family="inherit">A</text>
  </svg>
  <span class="label">Area</span>
  <input class="field" id="f-area" type="text" inputmode="decimal" placeholder="Enter Value" oninput="calc('area',this.value)">
  <span class="note">Total enclosed area</span>
</div>

</div>

<script>
const S3 = Math.sqrt(3);
const KEYS = ['side','circumradius','apothem','short','long','perim','area'];

function fmt(n) {
  return parseFloat(n.toFixed(4));
}

function fillAll(s) {
  document.getElementById('f-side').value        = fmt(s);
  document.getElementById('f-circumradius').value = fmt(s);
  document.getElementById('f-apothem').value      = fmt(s * S3 / 2);
  document.getElementById('f-short').value        = fmt(s * S3);
  document.getElementById('f-long').value         = fmt(s * 2);
  document.getElementById('f-perim').value        = fmt(s * 6);
  document.getElementById('f-area').value         = fmt(3 * S3 / 2 * s * s);
}

function calc(key, val) {
  // Strip non-numeric characters except decimal point
  const cleaned = val.replace(/[^0-9.]/g, '');
  if (cleaned !== val) {
    document.getElementById('f-' + key).value = cleaned;
    return;
  }

  // Cap at 16 characters
  if (val.length > 16) {
    document.getElementById('f-' + key).value = val.slice(0, 16);
    return;
  }

  // Cap at 4 decimal places
  const dotIndex = val.indexOf('.');
  if (dotIndex !== -1 && val.length - dotIndex - 1 > 4) {
    document.getElementById('f-' + key).value = val.slice(0, dotIndex + 5);
    return;
  }

  // Allow incomplete input like "10." or "" without clearing or recalculating
  if (val === '' || val === '.' || val.endsWith('.')) return;

  const v = parseFloat(val);
  if (isNaN(v) || v <= 0) {
    KEYS.forEach(k => {
      if (k !== key) document.getElementById('f-' + k).value = '';
    });
    return;
  }

  switch(key) {
    case 'side':         fillAll(v);              break;
    case 'circumradius': fillAll(v);              break;
    case 'apothem':      fillAll(v * 2 / S3);     break;
    case 'short':        fillAll(v / S3);         break;
    case 'long':         fillAll(v / 2);          break;
    case 'perim':        fillAll(v / 6);          break;
    case 'area':         fillAll(Math.sqrt(2 * v / (3 * S3))); break;
  }
}
</script>
  
<div style="text-align:center;padding:1rem 0 2rem">
    <img alt="Hits" src="https://hits.sh/www.hexagoncalc.com.svg?style=for-the-badge&label=Uses&color=c0273d"/>
</div>
  
</body>
</html>
